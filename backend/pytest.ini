[pytest]
testpaths = tests
# rootdir is backend/, so `import main`, `import storage` resolve the same way
# they do when the app runs.
pythonpath = .

# `live` tests call the real Gemini API: they cost quota, need a key, and fail
# without network. `network` tests make real outbound HTTP but cost no quota.
# `model` tests load the real embedding model (~80MB download, no API quota).
# All three are excluded by default; run them with `pytest -m live` / `-m network`
# / `-m model`.
addopts = -m "not live and not network and not model"

markers =
    live: hits the real Gemini API (needs GEMINI_API_KEY; deselected by default)
    network: makes real outbound HTTP to third parties (no API quota; deselected by default)
    model: loads the real sentence-transformers model (~80MB download, no quota; deselected by default)
    nostub: exercises the real categorize() offline; opts out of the stub fixture
